name: Deploy Site
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/alexsubramanian/alexsubramanian.com:latest

      - name: Trigger deploy
        run: |
          # Watchtower restarts the Caddy container that proxies this request,
          # so the connection will drop before we get a response. Fire and move on.
          curl -s --max-time 10 -X POST https://alexsubramanian.com/v1/update \
            -H "Authorization: Bearer ${{ secrets.WATCHTOWER_TOKEN }}" || true

      - name: Wait for site to restart
        run: sleep 15

      - name: Purge Cloudflare cache
        run: |
          curl -sf -X POST \
            "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'
