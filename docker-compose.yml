services:
  site:
    image: ghcr.io/alexsubramanian/alexsubramanian.com:latest
    container_name: alexsubramanian-site
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/caddy/certs:/etc/caddy/certs:ro
      - /var/log/caddy:/var/log/caddy
    restart: unless-stopped

  cloudflare-ddns:
    image: favonia/cloudflare-ddns:latest
    container_name: cloudflare-ddns
    network_mode: host
    environment:
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_DDNS_API_TOKEN}
      - DOMAINS=alexsubramanian.com
      - PROXIED=true
      - IP6_PROVIDER=none
      - UPDATE_CRON=0 */6 * * *
      - DETECTION_TIMEOUT=15s
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "https://api.cloudflare.com/cdn-cgi/trace", "-O", "/dev/null"]
      interval: 5m
      timeout: 15s
      retries: 3
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DOCKER_API_VERSION=1.40
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_HTTP_API_UPDATE=true
      - WATCHTOWER_HTTP_API_TOKEN=${WATCHTOWER_TOKEN}
      - WATCHTOWER_POLL_INTERVAL=86400
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    command:
      - '--path.rootfs=/host'
    network_mode: host
    pid: host
    volumes:
      - /:/host:ro,rslave
    restart: unless-stopped
