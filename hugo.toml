baseURL = 'https://alexsubramanian.com/'
languageCode = 'en-us'
title = 'Alex Subramanian'

theme = 'blowfish'

enableGitInfo = true

[taxonomies]
  tag = "tags"

[params]
  colorScheme = "ocean"
  defaultAppearance = "dark"
  autoSwitchAppearance = true
  showScrollToTop = true
  customCSS = ["css/custom.css"]

[params.homepage]
  layout = "profile"
  showRecent = true
  recentLimit = 5

[params.author]
  name = "Alex Subramanian"
  headline = "Software Engineer at Salesforce"
  bio = "Building Tableau Next at Salesforce. Former electrophysics and software engineer at Boeing (TS clearance). MS in Computer Science (Machine Learning) from ASU, BS in Electrical Engineering from Mizzou."
  links = [
    { github = "https://github.com/AlexSubramanian" },
  ]

[params.article]
  showDate = true
  showReadingTime = true
  showTableOfContents = true

[[menus.main]]
  name = "Resume"
  url = "/resume/"
  weight = 1

[[menus.main]]
  name = "Projects"
  url = "/projects/"
  weight = 2

[[menus.main]]
  name = "Docs"
  url = "/docs/"
  weight = 3
