baseURL = 'https://alexsubramanian.com/'
languageCode = 'en-us'
title = 'Alex Subramanian'

theme = 'blowfish'

enableGitInfo = true

[taxonomies]
  tag = "tags"

[params]
  colorScheme = "ocean"
  defaultAppearance = "dark"
  autoSwitchAppearance = true
  showScrollToTop = true
  customCSS = ["css/custom.css"]

[params.homepage]
  layout = "profile"
  showRecent = true
  recentLimit = 5

[params.author]
  name = "Alex Subramanian"
  headline = "Senior Software Engineer at Salesforce (Tableau)"
  bio = "Designing and shipping LLM-powered agentic features at Salesforce. Built the core analytics platform for Tableau Pulse. 13+ years spanning enterprise SaaS, AI/ML, and defense/aerospace. MS in Computer Science (AI/ML) from ASU."
  links = [
    { github = "https://github.com/AlexSubramanian" },
  ]

[params.article]
  showDate = true
  showReadingTime = true
  showTableOfContents = true

[[menus.main]]
  name = "Resume"
  url = "/resume/"
  weight = 1

[[menus.main]]
  name = "Projects"
  url = "/projects/"
  weight = 2

[[menus.main]]
  name = "Docs"
  url = "/docs/"
  weight = 3
