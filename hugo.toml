baseURL = 'https://alexsubramanian.com/'
languageCode = 'en-us'
title = 'Alex Subramanian'

theme = 'blowfish'

enableGitInfo = true

[taxonomies]
  tag = "tags"

[params]
  colorScheme = "ocean"
  defaultAppearance = "dark"
  autoSwitchAppearance = true
  showScrollToTop = true

[params.homepage]
  layout = "profile"
  showRecent = true
  recentLimit = 5

[params.author]
  name = "Alex Subramanian"
  headline = "Infrastructure & DevOps"
  bio = "Technology professional with hands-on experience in infrastructure, networking, and automation."

[params.article]
  showDate = true
  showReadingTime = true
  showTableOfContents = true

[[menus.main]]
  name = "Resume"
  url = "/resume/"
  weight = 1

[[menus.main]]
  name = "Projects"
  url = "/projects/"
  weight = 2

[[menus.main]]
  name = "Docs"
  url = "/docs/"
  weight = 3
